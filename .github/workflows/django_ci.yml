name: Django CI/CD  # workflow name

on:
  push:
    branches: [main]  # run when push to main branch
  pull_request:
    branches: [main]  # run when PR to main

jobs:

  test:  # first job name
    runs-on: ubuntu-latest  # use ubuntu machine

    services:
      postgres:  # database service
        image: postgres:15-alpine  # postgres image
        env:
          POSTGRES_DB: mydb
          POSTGRES_USER: ali
          POSTGRES_PASSWORD: root
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
        ports:
          - 5432:5432  # expose port

        # wait until database is ready
        options: >-
          --health-cmd="pg_isready -U ali"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:  # steps must be inside job

      - name: Checkout code  # get code from repo
        uses: actions/checkout@v4  # latest version

      - name: Setup Python  # install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"  # python version

      - name: Install dependencies  # install packages
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests  # run django tests
        env:
          DJANGO_SETTINGS_MODULE: core.settings  # django settings
         # DATABASE_URL: ${{ secrets.DATABASE_URL }}  # db from secrets
          DATABASE_URL: postgres://ali:root@localhost:5432/mydb
        run: |
          python manage.py migrate
          python manage.py test


  build-and-push:  # second job
    needs: test  # run after test job

    if: github.ref == 'refs/heads/main'  # only run on main branch

    runs-on: ubuntu-latest  # fixed typo (was ubunto)

    steps:

      - name: Checkout code again  # get code again
        uses: actions/checkout@v4

      - name: Docker login  # login to docker hub
        uses: docker/login-action@v3  # fixed name
        with:
          username: ${{ secrets.DOCKER_USERNAME }}  # docker username
          password: ${{ secrets.DOCKER_TOKEN }}  # docker token (better than password)

      - name: Build and push image  # build docker image
        uses: docker/build-push-action@v5
        with:
          context: .  # project folder
          push: true  # push to docker hub
          tags: |
             ${{ secrets.DOCKER_USERNAME }}/django-app:latest  # image name
           
             ${{ secrets.DOCKER_USERNAME }}/django-app:${{ github.sha }}  # image name with commit ID
